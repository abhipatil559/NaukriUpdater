<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Courier New', monospace; font-weight: 700; }
    .text  { font-family: 'Courier New', monospace; font-weight: 400; }
  </style>

  <!-- background -->
  <rect width="680" height="220" rx="12" fill="#0D0D0D"></rect>
  <rect width="680" height="220" rx="12" fill="none" stroke="#00FF9C" stroke-width="0.4" opacity="0.1"></rect>

  <!-- title -->
  <text class="title" x="30" y="50" font-size="28" fill="#00FF9C">
    Nopri
  </text>

  <!-- subtitle -->
  <text class="text" x="30" y="75" font-size="12" fill="#00DD88">
    selenium-free naukri api client
  </text>

  <!-- divider -->
  <line x1="30" y1="90" x2="650" y2="90" stroke="#00FF9C" stroke-width="0.6" opacity="0.4"></line>

  <!-- description -->
  <text class="text" x="30" y="115" font-size="12" fill="#00BBCC">
    profile · resume · jobs · auto-apply
  </text>

  <!-- badges -->

  <rect x="30" y="140" width="110" height="22" rx="4" fill="#00FF9C" fill-opacity="0.1" stroke="#00FF9C" stroke-width="0.6"></rect>
  <text class="text" x="40" y="155" font-size="11" fill="#00FF9C">profile update</text>

  <rect x="150" y="140" width="110" height="22" rx="4" fill="#00DD88" fill-opacity="0.1" stroke="#00DD88" stroke-width="0.6"></rect>
  <text class="text" x="160" y="155" font-size="11" fill="#00DD88">resume upload</text>

  <rect x="270" y="140" width="130" height="22" rx="4" fill="#00BB77" fill-opacity="0.1" stroke="#00BB77" stroke-width="0.6"></rect>
  <text class="text" x="280" y="155" font-size="11" fill="#00BB77">recommended jobs</text>

  <rect x="410" y="140" width="120" height="22" rx="4" fill="#00CCAA" fill-opacity="0.1" stroke="#00CCAA" stroke-width="0.6"></rect>
  <text class="text" x="420" y="155" font-size="11" fill="#00CCAA">job search (wip)</text>

  <rect x="540" y="140" width="100" height="22" rx="4" fill="#00BBCC" fill-opacity="0.1" stroke="#00BBCC" stroke-width="0.6"></rect>
  <text class="text" x="550" y="155" font-size="11" fill="#00BBCC">auto-apply (wip)</text>

  <!-- footer -->
  <text class="text" x="30" y="190" font-size="10" fill="#006644">
    v0.1.0 · python 3.10+
  </text>

  <text class="text" x="480" y="190" font-size="10" fill="#00BBCC">
    nkparam ✓ solved
  </text>
